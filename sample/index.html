<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Ember — Turn rough notes into polished writing</title>
    <meta
      name="description"
      content="Drop your raw thinking in. Get back a polished one-pager, executive summary, or FAQ — tailored to your audience."
    />
    <meta name="robots" content="index, follow" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Ember — Turn rough notes into polished writing" />
    <meta
      property="og:description"
      content="Drop your raw thinking in. Get back a polished one-pager, executive summary, or FAQ — tailored to your audience."
    />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:site_name" content="Ember" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ember — Turn rough notes into polished writing" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap"
      rel="stylesheet"
    />

    <script>
      // Apply theme before React mounts to avoid a flash of the wrong scheme.
      // Canonical copy: THEME_BOOTSTRAP_SCRIPT in @flux-ui/react. Keep in sync.
      ;(function () {
        var m = document.cookie.match(/(?:^|;\s*)flux-theme=([^;]*)/)
        var t = m ? decodeURIComponent(m[1]) : null
        if (t !== 'light' && t !== 'dark' && t !== 'system') {
          try {
            t = localStorage.getItem('theme')
          } catch (e) {
            t = null
          }
        }
        if (t !== 'light' && t !== 'dark' && t !== 'system') t = 'dark'
        var dark = t === 'system' ? matchMedia('(prefers-color-scheme: dark)').matches : t === 'dark'
        if (dark) document.documentElement.classList.add('dark')
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
